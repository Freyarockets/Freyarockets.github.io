<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Teddy Chat — Stardust Avatar</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <main class="chat-root">
    <header class="header">
      <img src="/static/images/teddy.svg" alt="Teddy" class="avatar-img" />
      <h1>Teddy — Stardust Avatar</h1>
    </header>

    <section id="chat" class="chat-window"></section>

    <form id="chatForm" class="chat-form">
      <input id="messageInput" type="text" placeholder="Say hi to Teddy..." autocomplete="off"/>
      <button type="submit">Send</button>
    </form>
  </main>

  <script src="/static/js/chat.js"></script>
</body>
</html>
